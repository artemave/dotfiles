services:
  devcontainer:
    security_opt:
      # makes tmux socket connectable from the container
      - label=disable
    working_dir: /workspace
    shm_size: "1g"
    # Firefox + geckodriver + Puma across 16 parallel JS test workers exhaust the default container PID budget.
    pids_limit: 8192
    volumes:
      - .:/workspace:cached,Z
      - ${HOME}/projects/dotfiles:/home/dev/dotfiles:ro,Z
      # Reuse host Neovim installs and runtime state across dev containers.
      - ${HOME}/.local/share/nvim:/home/dev/.local/share/nvim:rw,Z
      - ${HOME}/.local/state/nvim:/home/dev/.local/state/nvim:rw,Z
      - ${HOME}/.cache/nvim:/home/dev/.cache/nvim:rw,Z
      - ${HOME}/.claude.json:/home/dev/.claude.json.host:ro,Z
      - ${HOME}/.claude/.credentials.json:/home/dev/.claude/.credentials.json.host:ro,Z
      - ${HOME}/.config/Claude:/home/dev/.config/Claude:rw,Z
      - ${HOME}/.config/BraveSoftware:/home/dev/.config/BraveSoftware:rw,Z
      - ${HOME}/.codex:/home/dev/.codex:rw,Z
      - ${HOME}/.config/github-copilot:/home/dev/.config/github-copilot:rw,Z
      - ${HOME}/.dust/:/home/dev/.dust:rw,Z
      - ${XDG_RUNTIME_DIR}:${XDG_RUNTIME_DIR}:rw
      - ${SSH_AUTH_SOCK}:${SSH_AUTH_SOCK}:rw
      - /run/user/1000/containers:/run/user/1000/containers:ro
      - /tmp/tmux-1000:/tmp/tmux-1000:ro,z
      - /tmp/tmux-containers:/tmp/tmux-containers:rw,z
    userns_mode: "keep-id"
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR}
      WAYLAND_DISPLAY: ${WAYLAND_DISPLAY}
      DBUS_SESSION_BUS_ADDRESS: ${DBUS_SESSION_BUS_ADDRESS}
      SSH_AUTH_SOCK: ${SSH_AUTH_SOCK}
      XDG_SESSION_TYPE: wayland
      GIO_USE_PORTAL: "1"
      GTK_USE_PORTAL: "1"
      HOST_PROJECT_DIR: ${PWD}
      BROWSER: brave-browser-stable
    stdin_open: true
    tty: true
