services:
  devcontainer:
    security_opt:
      - label=disable
    working_dir: /workspace
    shm_size: "1g"
    # Firefox + geckodriver + Puma across 16 parallel JS test workers exhaust the default container PID budget.
    pids_limit: 8192
    volumes:
      - ${REPO:-.}:/workspace
      - cache:/home/dev/.cache
      - ${HOME}/projects/dotfiles:/home/dev/dotfiles:ro
      # Reuse host Neovim installs and runtime state across dev containers.
      - ${HOME}/.local/share/nvim:/home/dev/.local/share/nvim:rw
      - ${HOME}/.cache/nvim:/home/dev/.cache/nvim:rw
      - ${HOME}/.claude.json:/home/dev/.claude.json.host:ro
      - ${HOME}/.claude/settings.json:/home/dev/.claude/settings.json.host:ro
      - ${HOME}/.claude/.credentials.json:/home/dev/.claude/.credentials.json.host:ro
      - ${HOME}/.config/Claude:/home/dev/.config/Claude:rw
      - ${HOME}/.codex:/home/dev/.codex:rw
      - ${HOME}/.config/github-copilot:/home/dev/.config/github-copilot:rw
      - ${HOME}/.dust/:/home/dev/.dust:rw
      - ${HOME}/.aws/config:/home/dev/.aws/config:rw
      - ${SSH_AUTH_SOCK}:${SSH_AUTH_SOCK}:rw
      - ${XDG_RUNTIME_DIR}:${XDG_RUNTIME_DIR}:rw
      - ${XDG_RUNTIME_DIR}/${WAYLAND_DISPLAY}:${XDG_RUNTIME_DIR}/${WAYLAND_DISPLAY}:rw # host clipboard integration
      # Expose kitty's terminfo so TERM=xterm-kitty inside the container has a
      # description to look up. Without it ncurses falls back to the basic
      # xterm entry (8 colors, no italics, no undercurl).
      - /usr/share/terminfo/x/xterm-kitty:/usr/share/terminfo/x/xterm-kitty:ro
    userns_mode: "keep-id:uid=1000,gid=1000"
    environment:
      XDG_SESSION_TYPE: wayland
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SSH_AUTH_SOCK: ${SSH_AUTH_SOCK}
      WAYLAND_DISPLAY: ${WAYLAND_DISPLAY}
      XDG_RUNTIME_DIR: ${XDG_RUNTIME_DIR}
      # Pass kitty's terminal capabilities through to in-container apps; the
      # corresponding terminfo entry is bind-mounted above.
      TERM: ${TERM:-xterm-256color}
      COLORTERM: ${COLORTERM:-truecolor}
      # GH_TOKEN: ${GH_TOKEN}
    stdin_open: true
    tty: true
    # Pairs with `touch /tmp/devcontainer-ready` at the end of the entrypoint's
    # pre-exec setup. ``podman-compose up --wait`` blocks until this passes, so
    # downstream consumers (hop's editor launch, etc.) don't race the
    # entrypoint's setup. ``CMD-SHELL`` so the test runs in /bin/sh — bash
    # isn't guaranteed inside every image variant.
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/devcontainer-ready"]
      interval: 1s
      timeout: 1s
      retries: 30
      start_period: 1s
volumes:
  cache:
